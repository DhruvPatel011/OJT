<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day7-OJT</title>
    <link rel="stylesheet" href="day7.css">
</head>
<body>
    <header>
        <div class="heading">ALL About JS</div>
    </header>
    <h3 id="title"><mark>Event Handling</mark></h3>
    <hr>

    <br>
    <h3 class="h33">1. Focus & Change events</h3>
    Select Product : <select name="" id="product">
    <option value="default">Select Product</option>
    <option value="45000">AC</option>
    <option value="22000">TV</option>
    <option value="15000">Refrigerator</option>
    <option value="70000">Laptop</option> </select>
    <br><br>
    Net Prize : <input type="text" id="prize"> <br><br>
    Quantity : <input type="text" id="quantity">
    <br><br>
    Total Amount :<input type="text" id="amount">

    <br><br>
    <h3 class="h33">2. mouseover and mouseout events</h3>
    <img id="demoImg" src="../imgs/image copy.png" style="width:300px; height:100px" onmouseover="changeImage()" onmouseout="restoreImage()" alt="Demo Image">
    
    <br><br>
    <h3 class="h33">3.1 Keypress event</h3>
    <p>Press any key to display Current Date: </p>
    <button type="button" onkeypress="f()">Press Here</button>
    <p id="dop"></p>

    <br><br>
    <h3 class="h33">3.2 Keypress event </h3>
    <input type="text" id="rows" placeholder="Enter Rows"> <br>
    <input type="text" id="cols" placeholder="Enter Cols"> <br>
    <input type="button" value="Generate Table" id="btn1">

    <br><br>
    <h3 class="h33">4. Set & Clear (TImeout/Interval) Method</h3>
    <p id="wrt"></p>
    <p id="wt"></p>

    
    

    <script src="day7.js"></script>
    <br><br>
    <hr>
    <br>
    <div class="heading">Thank Yoou !</div>
</body>
</html>
